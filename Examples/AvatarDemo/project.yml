name: AvatarDemo
options:
  bundleIdPrefix: dev.momomo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  AvatarDemo:
    type: application
    platform: iOS
    sources:
      - path: .
        includes:
          - "*.swift"
    dependencies:
      - package: AvatarKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.momomo.avatar-demo
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: P2GN9QW8E5
packages:
  AvatarKit:
    path: ../..
